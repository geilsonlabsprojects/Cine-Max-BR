<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMaxBR | Catálogo</title>

    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E50914">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/705/705062.png">
</head>
<body class="bg-black">
    <div id="particles-js"></div>

    <!-- Sidebar Reutilizável -->
    <nav class="sidebar-pro">
        <a href="index.html" class="brand mb-5 px-3">
            <i class="fas fa-play-circle"></i>
        </a>
        <a href="index.html" class="sidebar-item">
            <i class="fas fa-home"></i>
            <span>Início</span>
        </a>
        <a href="catalog.html?type=movie" class="sidebar-item" id="navMovies">
            <i class="fas fa-film"></i>
            <span>Filmes</span>
        </a>
        <a href="catalog.html?type=series" class="sidebar-item" id="navSeries">
            <i class="fas fa-tv"></i>
            <span>Séries</span>
        </a>
        <a href="catalog.html?type=favorites" class="sidebar-item" id="navFavs">
            <i class="fas fa-heart"></i>
            <span>Minha Lista</span>
        </a>
        <div class="mt-auto"></div>
        <a href="#" class="sidebar-item" id="sidebarLogout">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
        </a>
    </nav>

    <main style="margin-left: 80px;">
        <nav class="navbar navbar-expand-lg navbar-dark navbar-pro sticky-top" style="left: 80px; background: rgba(0,0,0,0.9);">
            <div class="container-fluid px-5">
                <h2 id="pageTitle" class="section-title m-0 border-0">Catálogo</h2>
                <div class="ms-auto d-flex align-items-center gap-4">
                    <i class="fas fa-search cursor-pointer fs-5" onclick="window.location.href='index.html?search=true'"></i>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-5 py-5">
            <div id="catalogGrid" class="row g-4"></div>
        </div>
    </main>

    <!-- Modal de Detalhes Reutilizado -->
    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-premium modal-dialog-centered">
            <div class="modal-content hyper-glass">
                <div class="modal-body p-0" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script type="module" src="assets/js/core/app.js"></script>

    <script type="module">
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const title = document.getElementById('pageTitle');

        if (type === 'movie') {
            document.getElementById('navMovies').classList.add('active');
            title.innerText = "Todos os Filmes";
        } else if (type === 'series') {
            document.getElementById('navSeries').classList.add('active');
            title.innerText = "Séries & Originais";
        } else if (type === 'favorites') {
            document.getElementById('navFavs').classList.add('active');
            title.innerText = "Minha Lista";
        }
    </script>
</body>
</html>
